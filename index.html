<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محفظة النصوص - Clipboard</title>
    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 { text-align: center; color: #333; margin-top: 0; font-size: 22px; }
        
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ced4da; border-radius: 8px;
            box-sizing: border-box; font-family: inherit; font-size: 15px;
            background-color: #f8f9fa;
        }
        input:focus, textarea:focus { outline: none; border-color: #80bdff; }
        
        .main-btn {
            background-color: #007bff; color: white; border: none;
            padding: 12px 15px; border-radius: 8px; cursor: pointer;
            font-size: 16px; width: 100%; transition: 0.2s; font-weight: bold;
        }
        .main-btn:hover { background-color: #0056b3; }
        
        .clipboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .clip-item {
            background-color: #f1f3f5;
            border: 1px solid #e2e6ea;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
            height: 80px; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .clip-item:hover {
            background-color: #e2e6ea;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .clip-item p {
            margin: 0;
            font-size: 14px;
            color: #495057;
            text-align: center;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
            pointer-events: none; 
        }
        
        .delete-btn {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: rgba(220, 53, 69, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
            cursor: pointer;
            padding: 0;
            display: none; 
        }
        .clip-item:hover .delete-btn { display: block; }
        .delete-btn:hover { background-color: #dc3545; }

        .btn-logout { background-color: #6c757d; margin-top: 30px; }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }

        #app-screen { display: none; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h2>أهلاً بيك في الـ Clipboard بتاعتك</h2>
        <input type="password" id="password-input" placeholder="اكتب الباسوورد (رقم سري للغرفة)...">
        <button class="main-btn" onclick="login()">افتح الحافظة</button>
    </div>

    <div class="container" id="app-screen">
        <h2 style="font-size: 18px; color: #666; text-align: right; margin-bottom: 20px;">
            غرفة: <span id="current-room-name" style="color: #007bff;"></span>
        </h2>
        
        <textarea id="new-item-text" rows="2" placeholder="اكتب أو انسخ هنا أي حاجة عايز تحفظها..."></textarea>
        <button class="main-btn" onclick="addNewItem()">+ حفظ في الحافظة</button>

        <div class="clipboard-grid" id="items-container">
            <!-- الكروت هتترص هنا -->
        </div>

        <button class="main-btn btn-logout" onclick="logout()">قفل الغرفة</button>
    </div>

    <div id="toast">تم النسخ بنجاح! ✓</div>

    <script>
        // إعدادات Firebase بتاعتك
        const firebaseConfig = {
            apiKey: "AIzaSyBtIkF-UhkeFa-cxutgJAQpR7K_IjKxloc",
            authDomain: "spygame-337ee.firebaseapp.com",
            databaseURL: "https://spygame-337ee-default-rtdb.firebaseio.com", 
            projectId: "spygame-337ee",
            storageBucket: "spygame-337ee.firebasestorage.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentPassword = '';
        let localItems = [];

        function login() {
            const passInput = document.getElementById('password-input').value.trim();
            if (!passInput) return;

            currentPassword = passInput;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('current-room-name').innerText = "*".repeat(currentPassword.length);
            document.getElementById('password-input').value = '';

            // صائد أخطاء القراءة
            db.ref('clipboards/' + currentPassword).on('value', (snapshot) => {
                const data = snapshot.val();
                localItems = data ? data : []; 
                renderItems();
            }, (error) => {
                alert("فيه مشكلة في قراءة البيانات من فايربيز!\nالسبب: " + error.message);
            });
        }

        function renderItems() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';

            if (localItems.length === 0) {
                container.innerHTML = '<p style="grid-column: 1 / -1; text-align:center; color:#999; margin-top:20px;">الحافظة فاضية، ضيف نصوص عشان تظهر هنا.</p>';
                return;
            }

            localItems.forEach((itemText, index) => {
                const div = document.createElement('div');
                div.className = 'clip-item';
                div.onclick = () => copyItem(index);
                
                div.innerHTML = `
                    <p>${escapeHTML(itemText)}</p>
                    <button class="delete-btn" onclick="deleteItem(event, ${index})" title="حذف">✕</button>
                `;
                container.prepend(div);
            });
        }

        function addNewItem() {
            const textInput = document.getElementById('new-item-text');
            const text = textInput.value.trim();
            if (!text) return;

            localItems.push(text);
            
            // صائد أخطاء الكتابة (الحفظ)
            db.ref('clipboards/' + currentPassword).set(localItems)
                .then(() => {
                    // لو الداتا اترفع بنجاح الخانة هتفضى
                    textInput.value = '';
                })
                .catch((error) => {
                    // لو فايربيز رفض، هيطلع الرسالة دي
                    alert("للأسف فايربيز رفض يحفظ! \nالسبب: " + error.message);
                    
                    // هنحذف النص من الشاشة قدامك عشان متفتكرش إنه اتحفظ
                    localItems.pop();
                    renderItems();
                });
        }

        function copyItem(index) {
            const textToCopy = localItems[index];
            navigator.clipboard.writeText(textToCopy).then(() => {
                showToast();
            });
        }

        function deleteItem(event, index) {
            event.stopPropagation();
            if (confirm("متأكد إنك عايز تحذف النص ده؟")) {
                const itemToDelete = localItems[index];
                localItems.splice(index, 1);
                
                // صائد أخطاء الحذف
                db.ref('clipboards/' + currentPassword).set(localItems)
                    .catch((error) => {
                        alert("فايربيز رفض الحذف! \nالسبب: " + error.message);
                        // نرجع العنصر تاني لو الحذف فشل
                        localItems.splice(index, 0, itemToDelete);
                        renderItems();
                    });
            }
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
        }

        function logout() {
            db.ref('clipboards/' + currentPassword).off(); 
            currentPassword = '';
            localItems = [];
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
